<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<lable for="name">Name</lable>
		<input id="name" type="Text" name="name" required>
		<lable for="email">Email</lable>
		<input id="email" type="email" name="email" required>
		<lable for="gender_m">Male</lable>
		<input id="gender_m" type="radio" name="gender" value="male"required>
		<lable for="gender_f">Female</lable>
		<input id="gender_f" type="radio" name="gender" value="female" required>
		<lable for="cars">Car Brands</lable>
		<select id="cars">
			<option value="BMW">BMW</option>
			<option value="Audi">Audi</option>
			<option value="Mercedez">Mercedez</option>
		</select>
		<lable for="carage">Car Age</lable>
		<input id="carage" type="Number" name="carage" required>
		<lable for="dop">Date of Purchase (dop)</lable>
		<input id="dop" type="date" name="dop" required>
		<lable for="password">Password</lable>
		<input id="password" type="password" name="password" required>
		<button type="submit">Submit Button</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
